server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # tRPC: proxy to the api container so the browser can speak to a
  # private (non-public) backend through the same origin as the SPA.
  # `api` resolves to the api container via Docker DNS at runtime.
  # Port 3001 mirrors apps/api's PORT — keep them in sync if you change
  # one. The Alive deploy contract in /alive.toml's
  # [deploy.services.api] declares the same port.
  location /trpc/ {
    proxy_pass http://api:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
    proxy_read_timeout 300s;
  }

  # SPA fallback for tanstack-router routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
