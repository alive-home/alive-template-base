# Branch protection should require exactly one check: "CI / ci".
# It aggregates every job below, so adding a job here automatically
# makes it required — no branch-protection edits needed.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: bun run lint
      - run: bunx syncpack lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      # Mirror the quickstart: build against the example env, then prove the
      # VITE_* values really got inlined — a bundle built without them fails
      # only at runtime in the browser, which CI would never see.
      - run: cp .env.example .env
      - run: bun run build
      - name: Assert VITE env was inlined
        run: grep -rq "localhost:3001" apps/web/dist/assets/

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup

      - name: Restore Playwright browsers
        id: pw-cache
        uses: actions/cache/restore@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: bun --filter e2e install-browsers

      - name: Save Playwright browsers (main only)
        if: github.ref == 'refs/heads/main' && steps.pw-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      # Playwright boots api + web itself (webServer in playwright.config.ts)
      # with its own localhost defaults — no .env needed in CI.
      - run: bun run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

  docker:
    # Validates that both images build from a clean context — catches missing
    # COPY lines and frozen-lockfile drift that local dev never hits. Build
    # cache is read from main's CD runs; PRs never write cache (storage quota).
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      # Exposes ACTIONS_RUNTIME_TOKEN etc. to run-steps — required for
      # `cache-from type=gha` when invoking buildx directly.
      - uses: crazy-max/ghaction-github-runtime@v4
      # -f is load-bearing: bare `bake` also merges compose.yaml, whose
      # required AUTH_SECRET interpolation fails outside local dev.
      - name: Build images (amd64, no push)
        run: |
          docker buildx bake -f docker-bake.hcl \
            --set "*.platform=linux/amd64" \
            --set "api.cache-from=type=gha,scope=api" \
            --set "web.cache-from=type=gha,scope=web"

  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7
          ./actionlint -color

  ci:
    # The single required check. `if: always()` so it still reports when a
    # dependency fails — otherwise a skipped aggregator counts as "passing"
    # under branch protection's "required checks that didn't run" semantics.
    needs: [lint, typecheck, build, e2e, docker, workflow-lint]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify all jobs succeeded
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "job results: $results"
          for r in $results; do
            [ "$r" = "success" ] || { echo "::error::a required job ended as '$r'"; exit 1; }
          done
