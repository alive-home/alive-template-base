name: Setup
description: |
  bun (version from package.json#packageManager) + frozen dependency install.
  The bun global package cache is restored on every run but only saved from
  main: one cache entry per lockfile hash on the trunk instead of one per
  branch, and branches restore the latest main entry via restore-keys.

runs:
  using: composite
  steps:
    - name: Install bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: package.json

    - name: Restore bun package cache
      id: bun-cache
      uses: actions/cache/restore@v5
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile

    - name: Save bun package cache (main only)
      if: github.ref == 'refs/heads/main' && steps.bun-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
